---
apiVersion: v1
kind: Namespace
metadata:
  name: hybrid-cloud-app

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-dashboard
  namespace: hybrid-cloud-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-dashboard
  template:
    metadata:
      labels:
        app: nginx-dashboard
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "125m"
            limits:
              memory: "128Mi"
              cpu: "250m"
          volumeMounts:
            - name: html-volume
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: html-volume
          configMap:
            name: cloud-dashboard
