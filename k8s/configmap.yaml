        .role-tag { font-size: .68rem; font-weight: 700; padding: 2px 9px; border-radius: 20px; text-transform: uppercase; letter-spacing: .06em; }
        .tag-full { background: rgba(63,185,80,.18); color: #3fb950; }
        .tag-read { background: rgba(88,166,255,.18); color: #58a6ff; }
        .tag-none { background: rgba(139,148,158,.18); color: #8b949e; }
        .role-desc { font-size: .85rem; color: var(--muted); line-height: 1.5; margin-bottom: 1rem; }
        .perm-list { list-style: none; display: flex; flex-direction: column; gap: .4rem; }
        .perm-list li { font-size: .8rem; display: flex; align-items: center; gap: .5rem; color: var(--muted); }
        .perm-list li::before { content: ''; width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
        .perm-allow::before { background: var(--accent2); } .perm-deny::before { background: #6e7681; }
        .entra-box { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: var(--radius); padding: 1.2rem 1.4rem; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
        .entra-box .entra-logo { font-size: 1.8rem; flex-shrink: 0; }
        .entra-box .entra-info .label { font-size: .72rem; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }
        .entra-box .entra-info .value { font-size: .95rem; font-weight: 600; color: var(--accent2); margin-top: .2rem; }
        .entra-box .entra-info .sub { font-size: .8rem; color: var(--muted); margin-top: .15rem; }
        footer { background: var(--surface); border-top: 1px solid var(--border); text-align: center; padding: 1rem; font-size: .78rem; color: var(--muted); }
      </style>
    </head>
    <body>
    <header>
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#58a6ff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.35C17.25 22.15 21 17.25 21 12V7L12 2z"/></svg>
        <span>Hybrid Cloud Identity Portal</span>
      </div>
      <div class="cloud-badge" id="cloud-badge">Loading…</div>
    </header>
    <main>
      <section class="hero">
        <h1>Welcome to the<br><span>Identity Federation</span> Dashboard</h1>
        <p>Unified RBAC across Azure AKS · AWS EKS · GCP GKE — powered by Microsoft Entra ID.</p>
      </section>
      <div class="info-strip">
        <div class="info-card"><div class="icon icon-cloud">☁️</div><div><div class="label">Running on</div><div class="value" id="cloud-value">Detecting…</div></div></div>
        <div class="info-card"><div class="icon icon-auth">🔐</div><div><div class="label">Identity Provider</div><div class="value"><span class="status-dot"></span>Microsoft Entra ID</div></div></div>
        <div class="info-card"><div class="icon icon-auth">✅</div><div><div class="label">Session Status</div><div class="value">Authenticated</div></div></div>
      </div>
      <div>
        <div class="section-title">Authentication</div>
        <div class="entra-box">
          <div class="entra-logo">🏢</div>
          <div class="entra-info">
            <div class="label">Authenticated via</div>
            <div class="value">Microsoft Entra ID (Azure Active Directory)</div>
            <div class="sub">OAuth 2.0 · OIDC · Group-based RBAC mapping active</div>
          </div>
        </div>
      </div>
      <div>
        <div class="section-title">Entra ID Group → Kubernetes Role Bindings</div>
        <div class="roles-grid">
          <div class="role-card">
            <div class="role-header"><div class="role-name">👑 Admin</div><div class="role-tag tag-full">Full Access</div></div>
            <div class="role-desc">Members of <strong>Cloud-Admins</strong> Entra ID group. Bound to <code>cloud-admin-role</code> — unrestricted cluster access.</div>
            <ul class="perm-list">
              <li class="perm-allow">All API groups and resources</li>
              <li class="perm-allow">Create, update, delete workloads</li>
              <li class="perm-allow">Manage RBAC and namespaces</li>
              <li class="perm-allow">Cluster-wide operations</li>
            </ul>
          </div>
          <div class="role-card">
            <div class="role-header"><div class="role-name">🛠 Developer</div><div class="role-tag tag-read">Read-Only</div></div>
            <div class="role-desc">Members of <strong>Cloud-Developers</strong> Entra ID group. Bound to <code>cloud-developer-role</code> — observability only.</div>
            <ul class="perm-list">
              <li class="perm-allow">Get, list, watch pods &amp; services</li>
              <li class="perm-allow">Get, list, watch deployments</li>
              <li class="perm-allow">Stream pod logs</li>
              <li class="perm-deny">No create, update, or delete</li>
            </ul>
          </div>
          <div class="role-card">
            <div class="role-header"><div class="role-name">👁 Viewer</div><div class="role-tag tag-none">No Access</div></div>
            <div class="role-desc">Users not in any mapped Entra ID group. No ClusterRoleBinding exists — all requests denied by default.</div>
            <ul class="perm-list">
              <li class="perm-deny">No cluster access</li>
              <li class="perm-deny">No namespace access</li>
              <li class="perm-deny">No resource visibility</li>
              <li class="perm-deny">Auth succeeds; authorization denied</li>
            </ul>
          </div>
        </div>
      </div>
    </main>
    <footer>Hybrid Cloud Identity Lab &nbsp;·&nbsp; Microsoft Entra ID Federation &nbsp;·&nbsp; AKS · EKS · GKE &nbsp;·&nbsp; <span id="footer-cloud"></span></footer>
    <script>
      const meta = document.querySelector('meta[name="cloud-provider"]');
      const cloud = meta ? meta.content : 'Unknown Cloud';
      document.getElementById('cloud-value').textContent = cloud;
      document.getElementById('cloud-badge').textContent = cloud;
      document.getElementById('footer-cloud').textContent = cloud;
    </script>
    </body>
    </html>
